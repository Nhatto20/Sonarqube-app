name: SonarQube Analysis

on:
  push:
    branches: [main, develop]
    paths:
      - "sonarqube-app/**"
      - ".github/workflows/sonarqube.yml"
  pull_request:
    branches: [main]
    paths:
      - "sonarqube-app/**"
      - ".github/workflows/sonarqube.yml"

defaults:
  run:
    working-directory: sonarqube-app

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff + Black)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install ruff black

      - name: Run Ruff
        run: ruff check .

      - name: Run Black (check mode)
        run: black --check .

  # ── Job 2: Test + Coverage ───────────────────────────────────────────────────
  test:
    name: Test (pytest + coverage)
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: sonarqube-app/coverage.xml

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: sonarqube-app/test-results.xml

  # ── Job 3: SonarQube Analysis & Quality Gate ─────────────────────────────────
  # Dùng self-hosted runner + secrets SONAR_TOKEN / SONAR_HOST_URL
  # giống hệt ci.yml — không cần cài thêm SonarQube
  sonarqube:
    name: SonarQube Analysis & Quality Gate
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v5
        with:
          name: coverage-report
          path: sonarqube-app

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: sonarqube-app
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: sonarqube-app/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
